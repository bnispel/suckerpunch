<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SuckerPunch</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>SuckerPunch</h1>
  <canvas id="game" width="800" height="540"></canvas>
  <div id="hint">← → move &nbsp;•&nbsp; Space jump &nbsp;•&nbsp; F / ↓ attack &nbsp;•&nbsp; R menu</div>

  <!-- Portrait touch controls: a button bar shown below the game on touch
       devices held upright (landscape uses the on-canvas overlay buttons). -->
  <div id="touch-bar">
    <div class="pad">
      <button class="tbtn" data-act="left">◀</button>
      <button class="tbtn" data-act="right">▶</button>
    </div>
    <div class="pad">
      <button class="tbtn hit" data-act="attack">HIT</button>
      <button class="tbtn jump" data-act="jump">JUMP</button>
    </div>
  </div>

  <!-- Vercel Web Analytics (static-site integration; enable it in the Vercel
       dashboard under the project's Analytics tab). -->
  <script defer src="/_vercel/insights/script.js"></script>

  <!-- Scripts load in dependency order (classic scripts share one global scope,
       so the game runs by just opening this file — no build step or server). -->
  <script src="js/config.js"></script>
  <script src="js/world.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/state.js"></script>
  <script src="js/input.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
